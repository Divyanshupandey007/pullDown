<aside
  class="h-screen flex-shrink-0 flex flex-col backdrop-blur-3xl py-8 z-[60] transition-all duration-500"
  [style.background]="'var(--sidebar-bg)'"
  [style.borderRight]="'1px solid var(--border-subtle)'"
  [ngClass]="isCollapsed ? 'w-20' : 'w-60'">
  <div class="px-7 mb-10 flex items-center" [ngClass]="isCollapsed ? 'justify-center' : 'justify-between'">
    <div *ngIf="!isCollapsed" class="transition-all duration-300">
      <h1 class="text-xl font-black italic tracking-tighter" style="color: var(--text-primary)">PullDown</h1>
    </div>
    <button class="hover:text-primary transition-theme flex-shrink-0" style="color: var(--text-muted)" (click)="toggleSidebar()">
      <span class="material-symbols-outlined text-xl">{{ isCollapsed ? 'menu' : 'menu_open' }}</span>
    </button>
  </div>

  <nav class="flex flex-col flex-grow space-y-0.5">
    <button *ngFor="let tab of tabs" (click)="selectTab(tab.id)"
      class="tab-btn flex items-center gap-4 px-7 py-3.5 transition-theme font-headline uppercase tracking-widest text-[11px]"
      [ngClass]="activeTab === tab.id ? 'text-primary bg-primary/10 border-r-[3px] border-primary' : 'hover:bg-white/5'"
      [style.color]="activeTab !== tab.id ? 'var(--text-muted)' : ''">
      <span class="material-symbols-outlined text-xl">{{ tab.icon }}</span>
      <span *ngIf="!isCollapsed">{{ tab.label }}</span>
    </button>
  </nav>
</aside>
